- hosts: webserver-django
  vars:
    postgresql_service_name: "postgresql"
    virtualenv_dir: /home/{{ ansible_user }}/django-cms-env
    app_name: MyApp
    app_folder: /home/{{ ansible_user }}/{{ app_name }}
    db_name: "{{ app_name }}_db"
    db_user: django
    db_password: masterkey
    django_user_password: masterkey
  tasks:
    - name: Update repos information. Upgrade all packages
      apt:
        update_cache: yes
        cache_valid_time: 86400
      become: true

    - name: Install postgresql, postgresql-contrib and requrements
      apt:
        name: "{{ item }}"
        state: installed
        update_cache: yes
        cache_valid_time: 3600
      with_items:
        - postgresql
        - postgresql-contrib
        - libpq-dev
        - postgresql-client
        - python-dev
        - python-pip
        - python-psycopg2
        - virtualenv
        - nginx
      become: true

    - name: django | Install django-cms and gunicorn into virtualenv into user home directory
      pip:
        name: "{{ item }}"
        virtualenv: "{{ virtualenv_dir }}"
      with_items:
        - django-cms
        - gunicorn
      become: true
      become_user: "{{ ansible_user }}"

    - name: postgres | Ensure PostgreSQL is running
      service:
        name: "{{ postgresql_service_name }}"
        state: started

    - name: postgres | create database user
      become_user: postgres
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
      become: true

    - name: postgres | create database
      become_user: postgres
      postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"
        encoding: UTF8
        lc_collate: en_US.UTF-8
        lc_ctype: en_US.UTF-8
      become: true

    - name: django | check that the application already exists
      command: "ls {{ app_name }}"
      register: appstatus
      ignore_errors: True

    - name: django | Create django app
      command: "{{ virtualenv_dir }}/bin/django-admin startproject {{ app_name }}"
      when: appstatus.rc != 0
      become: true
      become_user: "{{ ansible_user }}"


    - name: django | pull settings.py
      template:
        src: ../configs/settings_django_crm.j2
        dest: "{{ app_folder }}/{{ app_name }}/settings.py"

    - name: django | pull urls.pu
      template:
        src: ../configs/django_crm_urls.j2
        dest: "{{ app_folder }}/{{ app_name }}/urls.py"

    - name: django | pull templates
      copy:
        src: templates/
        dest: "{{ app_folder }}/templates"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"


    - name: django | migrate db
      django_manage:
        command: "migrate"
        app_path: "{{ app_folder }}"
        virtualenv: "{{ virtualenv_dir }}"

    - name: postgres | push example.sql
      template:
        src: example.sql
        dest: "{{app_folder}}/example.sql"

    - name: postgres | restore a single schema for an existing database
      become_user: postgres
      become: true
      shell: "psql {{ db_name }} < {{ app_folder }}/example.sql"

    - name: django | collectstatic
      django_manage:
        command: "collectstatic"
        app_path: "{{ app_folder }}"
        virtualenv: "{{ virtualenv_dir }}"

    - name: django | create superuser
      django_manage:
        command: "createsuperuser --noinput --username={{ db_user }} --email={{ db_user }}@example.com"
        app_path: "{{ app_folder }}"
        virtualenv: "{{ virtualenv_dir }}"
      ignore_errors: true

    - name: django | change superuser password
      django_manage:
        virtualenv: "{{ virtualenv_dir }}"
        app_path: "{{ app_folder }}"
        command: shell -c "from django.contrib.auth.models import User; usr=User.objects.get(username='{{ db_user }}'); usr.set_password('{{ django_user_password }}'); usr.save()"

    - name: django | Check everything right
      django_manage:
        command: "cms check"
        app_path: "{{ app_folder }}"
        virtualenv: "{{ virtualenv_dir }}"

    - name: copy nginx config
      template:
        src: configs/nginx.j2
        dest: /etc/nginx/sites-enabled/django-cms.conf
      become: true

    - name: remove default nginx configs
      file:
        state: absent
        path: /etc/nginx/sites-available/default
      notify:
        - restart nginx

    - name: push gunicorn systemd configs
      template:
        src: configs/gunicorn.j2
        dest: /etc/systemd/system/gunicorn.service

    - name: enable gunicorn service
      systemd:
        name: gunicorn
        enabled: yes

    - name: restart gunicorn service
      systemd:
        name: gunicorn
        state: restarted
      notify:
        - restart nginx


  handlers:
  - name: restart nginx
    service: name=nginx state=restarted
  become: true

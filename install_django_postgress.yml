- hosts: webserver-django
  vars:
    postgresql_service_name: "postgresql"
    virtualenv_dir: /home/{{ ansible_user }}/django-cms-env
    app_name: MyApp
    app_folder: /home/{{ ansible_user }}/{{ app_name }}
    db_name: "{{ app_name }}_db"
    db_user: django
    db_password: masterkey
    django_user_password: masterkey
  tasks:
    - name: Update repos information. Upgrade all packages
      apt:
        update_cache: yes
        cache_valid_time: 86400
      become: true

    - name: Install postgresql, postgresql-contrib and requrements
      apt:
        name: "{{ item }}"
        state: installed
        update_cache: yes
        cache_valid_time: 3600
      with_items:
        - postgresql
        - postgresql-contrib
        - libpq-dev
        - postgresql-client
        - python-dev
        - python-pip
        - python-psycopg2
        - virtualenv
        - nginx
      become: true

    - name: Install django-cms into virtualenv into user home directory
      pip:
        name: "{{ item }}"
        virtualenv: "{{ virtualenv_dir }}"
      with_items:
        - django-cms
        - gunicorn

    - name: Ensure PostgreSQL is running
      service:
        name: "{{ postgresql_service_name }}"
        state: started

    - name: create database user
      become_user: postgres
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
      become: true

    - name: create database
      become_user: postgres
      postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"
        encoding: UTF8
        lc_collate: en_US.UTF-8
        lc_ctype: en_US.UTF-8
      become: true

    - name: check that the application already exists
      command: "ls {{ app_name }}"
      register: appstatus
      ignore_errors: True

    - name: Create django app
      command: "{{ virtualenv_dir }}/bin/django-admin startproject {{ app_name }}"
      when: appstatus.rc != 0

    - name: pull settings.py
      template:
        src: ../configs/settings_django_crm.j2
        dest: "{{ app_folder }}/{{ app_name }}/settings.py"

    - name: pull urls.pu
      template:
        src: ../configs/django_crm_urls.j2
        dest: "{{ app_folder }}/{{ app_name }}/urls.py"

    - name: pull templates
      copy:
        src: templates/
        dest: "{{ app_folder }}/templates"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"


    - name: migrate db
      django_manage:
        command: "migrate"
        app_path: "{{ app_folder }}"
        virtualenv: "{{ virtualenv_dir }}"

    # - name: Check if django superuser exists
    #   django_manage:
    #     virtualenv: "{{ virtualenv_dir }}"
    #     app_path: "{{ app_folder }}"
    #     command: shell -c 'import sys; from django.contrib.auth.models import User; sys.exit(0 if User.objects.filter(username="admin").count() > 0 else 1)'
    #   register: checksuperuser
    #   ignore_errors: True

    - name: create superuser
      django_manage:
        command: "createsuperuser --noinput --username={{ db_user }} --email={{ db_user }}@example.com"
        app_path: "{{ app_folder }}"
        virtualenv: "{{ virtualenv_dir }}"
      ignore_errors: true
      # when: checksuperuser.rc != 0

    # - name: push script for change password for superuser
    #   template:
    #     src: ../scripts/changepassword.sh.j2
    #     dest: "{{ app_folder }}/changepassword.sh"
    #     mode: 0755
    #
    # - name: Change password
    #   command: "{{app_folder}}/changepassword.sh"

    - name: change superuser password
      django_manage:
        virtualenv: "{{ virtualenv_dir }}"
        app_path: "{{ app_folder }}"
        command: shell -c "from django.contrib.auth.models import User; usr=User.objects.get(username='{{ db_user }}'); usr.set_password('{{ django_user_password }}'); usr.save()"

    - name: Check everything right
      django_manage:
        command: "cms check"
        app_path: "{{ app_folder }}"
        virtualenv: "{{ virtualenv_dir }}"

    - name: copy nginx config
      template:
        src: configs/nginx.j2
        dest: /etc/nginx/sites-enabled/django-cms.conf
      become: true

    - name: remove default nginx configs
      file:
        state: absent
        path: /etc/nginx/sites-available/default
      notify:
        - restart nginx

    - name: push gunicorn systemd configs
      template:
        src: configs/gunicorn.j2
        dest: /etc/systemd/system/gunicorn.service

  handlers:
  - name: restart nginx
    service: name=nginx state=restarted
  become: true
